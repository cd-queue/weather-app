<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather_app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter a city" spellcheck="false">
            <button><img class="searchimg" src="assets/search.png" alt="error"></button>
        </div>
        <div class="weather">
            <img src="assets/rain.png" class="weather-icone">
            <h1 class="temp">20°c</h1>
            <h2 class="city">New York</h2>
        </div>
        <div class="dettails">
            <div class="col">
                <img src="assets/humidity.png" alt="">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="assets/wind.png" alt="">
                <div>
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
